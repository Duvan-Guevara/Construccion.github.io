<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h2>Registro</h2>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="email" id="correo" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">



    <button onclick="registro()">Registrarse</button>

    <p id="mensaje" style="text-align:center;"></p>

    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
</div>

<script>
function registro() {
    const nombre = document.getElementById("nombre").value;
    const email = document.getElementById("correo").value;
    const password = document.getElementById("password").value;
    const mensaje = document.getElementById("mensaje");

    if (!email || !password) {
        mensaje.style.color = "red";
        mensaje.innerText = "⚠️ Completa todos los campos";
        return;
    }

    fetch("http://localhost:3000/auth/registro", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ 
            nombre,
            email,
            password 
        })
    })
    .then(res => res.json())
    .then(data => {
        mensaje.style.color = "green";
        mensaje.innerText = "✅ " + data.message;
    })
    .catch(error => {
        console.log(error);
        mensaje.style.color = "red";
        mensaje.innerText = "❌ Error al conectar con el servidor";
    });
}
</script>

</body>
</html>
