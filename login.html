<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h2>Iniciar Sesión</h2>

    <input type="email" id="correo" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>

    <p style="text-align:center; margin-top:10px;">
    <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
    </p>

    <p id="mensaje" style="text-align:center;"></p>

    <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
</div>

<script>
function login() {
    const email = document.getElementById("correo").value;
    const password = document.getElementById("password").value;
    const mensaje = document.getElementById("mensaje");

    if (!email || !password) {
        mensaje.style.color = "red";
        mensaje.innerText = "⚠️ Todos los campos son obligatorios";
        return;
    }

    fetch("http://localhost:3000/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {

        if (data.message === "Usuario no existe" || data.message === "Contraseña incorrecta") {
            mensaje.style.color = "red";
            mensaje.innerText = data.message;
            return;
        }

        mensaje.style.color = "green";
        mensaje.innerText = "✅ Login exitoso";

        // 🔐 Guardar sesión
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        setTimeout(() => {
            window.location.href = "principal.html";
        }, 1000);
    })
    .catch(error => {
        console.log(error);
        mensaje.style.color = "red";
        mensaje.innerText = "❌ Error al conectar con el servidor";
    });
}
</script>

</body>
</html>
